# SPDX-License-Identifier: Apache-2.0
#
# Direct web egress for Gandalf — kept SMALL after the 2026-06-21 pivot to
# Tavily-as-egress-gateway.
#
# Architecture as of the pivot:
#   - General arbitrary-URL web access goes through api.tavily.com (see
#     tavily-egress.yaml). Tavily fetches the target URL on Gandalf's
#     behalf and returns cleaned text. NextDNS still filters at the DNS
#     layer (malware/phishing/porn/gambling/piracy categories blocked
#     before connections leave the host).
#   - Each major service Gandalf uses directly has its own preset
#     (google-workspace-egress, github built-in, huggingface built-in,
#     pypi built-in, slack built-in, etc.).
#   - THIS file is the catch-all for the small handful of hosts that
#     (a) aren't covered by a dedicated preset, AND
#     (b) Gandalf needs to reach via direct HTTP rather than through Tavily.
#
# Kept hosts (and why each one):
#   - Cloudflare / DigiCert / IdenTrust: TLS handshake + cert revocation
#     checks. Many HTTPS clients block until they can hit OCSP/CRL.
#   - GitHub raw / gist / objects subdomains: skill installs and raw-file
#     pulls that the gateway initiates (the bundled `github` preset only
#     covers github.com + api.github.com).
#   - DuckDuckGo / Bing landing pages: search-result fallback if Tavily is
#     rate-limited or down. NOT for routine queries.
#   - en.wikipedia.org: kept on its own because so many Hermes skills
#     reference it as a citation source and it's a perfectly safe direct fetch.
#
# Removed hosts (deliberately — they're now reached through Tavily):
#   - All news outlets (NYT/WaPo/WSJ/BBC/etc.)
#   - All AI vendor blogs (Anthropic/OpenAI/Mistral/Cohere/etc.)
#   - All conferences (NeurIPS/ICML/ICLR/ACL/TPC26/etc.)
#   - All academic search APIs (Semantic Scholar/Crossref/OpenAlex)
#   - All commercial search APIs (Exa/Firecrawl/Brave/Serper/Jina) —
#     these are alternatives to Tavily, not complements.
#   - All university / national-lab subdomain wildcards
#   - ArXiv / OpenReview / etc. — Tavily can fetch them
#   - Internet Archive — Tavily can fetch them
#
# To add a host back: just add it here, then
#   nemohermes sandbox policy add gandalf --from-file <this-file> --yes
#
# Source of truth: this file in ~/code/Spark-Hermes. The active preset on
# the sandbox is synced via ops/post-rebuild.sh.

preset:
  name: web-readonly-egress
  description: "Small set of direct-fetch hosts not routed through Tavily (TLS infra, GitHub raw, Wikipedia, search fallbacks)."

network_policies:
  web_readonly:
    name: web_readonly
    endpoints:
      # ── TLS handshake / cert revocation ─────────────────────────────
      - host: "*.cloudflare.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: ocsp.digicert.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: crl.identrust.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full

      # ── GitHub raw / gist / release objects (skill installs, etc.) ──
      - host: raw.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: gist.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: objects.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full

      # ── Wikipedia (kept on its own as primary citation source) ──────
      - host: en.wikipedia.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.wikipedia.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full

      # ── Charlie's work hosts (direct, not via Tavily — these are
      # primary destinations he edits/reads constantly) ────────────────
      - host: www.anl.gov
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.anl.gov"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: tpc26.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.tpc26.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: trillionparameters.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.trillionparameters.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full

      # ── Search engine landing pages (fallback only; routine queries
      # go through Tavily) ──────────────────────────────────────────────
      - host: duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: html.duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full

    binaries:
      - { path: "/**" }
