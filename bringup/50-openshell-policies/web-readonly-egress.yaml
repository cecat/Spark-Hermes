# SPDX-License-Identifier: Apache-2.0
#
# Broad web egress for Gandalf — gives the sandbox access to common
# reference, news, research, and developer hosts so the agent can:
#   - Read articles (for news-research tasks)
#   - Look things up on Wikipedia / docs sites
#   - Fetch papers from ArXiv
#   - Use GitHub APIs beyond the basic git path
#   - Register for things via web forms (POST/PUT/PATCH allowed)
#
# Layered with NextDNS (host-wide DNS filtering): even though this preset
# allows the connection at the OpenShell layer, malware / phishing / porn /
# gambling / piracy categories never resolve in the first place because
# NextDNS profile "Spark" (id YOUR_NEXTDNS_PROFILE_ID) returns NXDOMAIN for them.
#
# Apply with: nemohermes gandalf policy-add --from-file <this-file> --yes
#
# WHY NOT WILDCARD `*`: OpenShell's egress engine doesn't support a
# universal-host wildcard the way it supports subdomain wildcards
# (`*.example.com`). The design philosophy is explicit allowlisting. So
# this is a curated list — expand as Gandalf hits new blocked hosts you
# trust. Symptom of a block: tool call returns "policy denied" or a
# silent gaierror inside the sandbox.

preset:
  name: web-readonly-egress
  description: "Broad web access (curated hosts) — news, reference, research, dev. Layered with NextDNS DNS filtering."

network_policies:
  web_readonly:
    name: web_readonly
    endpoints:
      # ── Reference / encyclopedic ────────────────────────────────────
      - host: en.wikipedia.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: "*.wikipedia.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: en.wikibooks.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: en.wiktionary.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: commons.wikimedia.org
