# SPDX-License-Identifier: Apache-2.0
preset:
  name: managed-inference-widen
  description: "Allow Hermes' actual endpoint shapes on inference.local."

network_policies:
  managed_inference:
    name: managed_inference
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          # OpenAI-compatible (no /v1/)
          - allow: { method: POST, path: "/chat/completions" }
          - allow: { method: POST, path: "/completions" }
          - allow: { method: POST, path: "/embeddings" }
          # OpenAI-compatible (with /v1/)
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: POST, path: "/v1/completions" }
          - allow: { method: POST, path: "/v1/embeddings" }
          - allow: { method: POST, path: "/v1/messages" }
          # Models discovery (both prefixes)
          - allow: { method: GET, path: "/models" }
          - allow: { method: GET, path: "/v1/models" }
          - allow: { method: GET, path: "/v1/models/**" }
          # Ollama-compatible probes
          - allow: { method: POST, path: "/api/show" }
          - allow: { method: POST, path: "/api/tags" }
          - allow: { method: POST, path: "/api/chat" }
          - allow: { method: POST, path: "/api/generate" }
          - allow: { method: GET, path: "/api/show" }
          - allow: { method: GET, path: "/api/tags" }
          - allow: { method: GET, path: "/api/version" }
    binaries:
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3.11 }
      - { path: /usr/bin/python3.13 }
      - { path: /usr/bin/python3 }
      - { path: /opt/hermes/.venv/bin/python }
      - { path: /usr/local/bin/python3 }
