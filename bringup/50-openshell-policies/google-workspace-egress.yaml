# SPDX-License-Identifier: Apache-2.0
#
# Permit egress from the gandalf sandbox to Google's APIs so the
# google-workspace skill can refresh OAuth tokens and call Gmail/Drive/etc.
#
# Apply with: nemohermes gandalf policy-add --from-file <this-file> --yes

preset:
  name: google-workspace-egress
  description: "Google Workspace APIs (Gmail/Drive/Calendar/Docs/Sheets/People) + OAuth refresh"

network_policies:
  google_workspace:
    name: google_workspace
    endpoints:
      - host: oauth2.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/**" }
          - allow: { method: GET, path: "/**" }
      - host: accounts.google.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: gmail.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      - host: www.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      - host: people.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: sheets.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          # values.update is PUT, values.append/batchUpdate are POST,
          # values.batchUpdateByDataFilter is POST, developerMetadata.update
          # is PATCH, spreadsheets.create is POST, delete is DELETE.
          # Allowing all five covers the full sheets v4 surface area.
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: PATCH, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      - host: docs.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          # docs.batchUpdate is POST; docs.get is GET; some inline-image
          # updates use PATCH.
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: PATCH, path: "/**" }
      - host: drive.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      - host: calendar.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
    binaries:
      - { path: /opt/hermes/.venv/bin/python }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.13 }
