display_information:
  name: Gandalf
  description: Watchful steward of the system — Charlie's personal assistant.
  background_color: "#2c2c54"
features:
  bot_user:
    display_name: Gandalf
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  # Slash commands declared here so Slack delivers them to the app over
  # Socket Mode. Without this, /hermes shows "Running /hermes..." and
  # silently times out — Slack has no idea where to route the command.
  # `/hermes <subcommand> [args]` is the dispatcher form; Hermes routes
  # the subcommand (sethome, new, status, model, usage, etc.) internally.
  # See bringup/20-slack-app/README.md for the full subcommand list.
  slash_commands:
    - command: /hermes
      description: Send a command or question to Gandalf (try `/hermes help`)
      usage_hint: "[subcommand | question]"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - app_mentions:read
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - files:read
      - files:write
      - reactions:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
      - message.channels
      - message.groups
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
